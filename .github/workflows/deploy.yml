name: Backend CI/CD Deploy

on:
  push:
    branches: [ "main" ] # main 브랜치에 푸시(병합)될 때 동작

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'

    - name: Build with Maven
      run: ./mvnw clean package -DskipTests

    # 1. 빌드된 WAR 파일을 서버로 복사
    - name: Copy WAR to Server via SCP
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: 22
        source: "target/*.war"
        target: "~/moa-deploy" # 서버의 배포 경로
        strip_components: 1

    # 2. 서버에 접속하여 기존 프로세스 종료 및 새 애플리케이션 실행
    - name: Execute Deploy Script on Server
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: 22
        script: |
          cd ~/moa-deploy
          
          # 기존 동작중인 자바 프로세스 종료
          PID=$(pgrep -f moa-0.0.1-SNAPSHOT.war)
          if [ -z "$PID" ]; then
              echo "No running application found."
          else
              echo "Killing existing process $PID"
              kill -9 $PID
          fi
          
          # 새 버전 백그라운드 실행
          nohup java -jar moa-0.0.1-SNAPSHOT.war > application.log 2>&1 &
          echo "Deployment successful."
