name: Backend CI/CD Deploy

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: ./mvnw clean package -DskipTests

      - name: Copy WAR to Server via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          source: "target/*.war"
          target: "~/moa-deploy"
          strip_components: 1

      - name: Restart Backend Service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          script: |
            set -e
            APP_DIR=/opt/moa/backend
            APP_WAR=$APP_DIR/moa-0.0.1-SNAPSHOT.war
            UPLOAD_WAR=~/moa-deploy/moa-0.0.1-SNAPSHOT.war

            test -f "$UPLOAD_WAR"
            sudo mkdir -p "$APP_DIR"

            if [ -f "$APP_WAR" ]; then
              sudo cp "$APP_WAR" "$APP_WAR.bak.$(date +%Y%m%d%H%M%S)"
            fi

            sudo cp "$UPLOAD_WAR" "$APP_WAR"
            sudo chown ubuntu:ubuntu "$APP_WAR" || true
            sudo systemctl daemon-reload
            sudo systemctl restart moa-backend.service
            sudo systemctl status moa-backend.service --no-pager
