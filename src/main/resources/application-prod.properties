server.port=8080
server.ssl.enabled=false

app.upload.root-dir=/opt/moa/uploads
app.upload.community.inquiry-dir=${app.upload.root-dir}/community/inquiry
app.upload.community.answer-dir=${app.upload.root-dir}/community/answer

app.frontend-url=https://moa.jyyouk.shop
app.email.verify-base-url=https://moa.jyyouk.shop/api/auth/verify-email

oauth.kakao.redirect-uri=https://api-moa.jyyouk.shop/api/oauth/kakao/callback
oauth.google.redirect-uri=https://api-moa.jyyouk.shop/api/oauth/google/callback
openbanking.callback-url=https://api-moa.jyyouk.shop/api/openbanking/callback

app.cors.allowed-origins=https://jyyouk.shop,https://www.jyyouk.shop,https://moa.jyyouk.shop

server.servlet.session.cookie.same-site=Lax
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.http-only=true

bank-account.verification.provider=${BANK_ACCOUNT_VERIFICATION_PROVIDER:mock}
